name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Build app
        run: pnpm run build

      # On tags: package + publish to GitHub Release
      - name: Package & Publish
        if: startsWith(github.ref, 'refs/tags/v')
        run: electron-builder --${{ matrix.platform }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # On branches: package only
      - name: Package
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: electron-builder --${{ matrix.platform }} --publish never

      - uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.AppImage
            dist/*.snap
            dist/*.deb
            dist/*.dmg
            dist/*.zip
            dist/*.yml
            dist/*.yaml
          if-no-files-found: ignore
